name: Test Windows VS 2026 (temporary)

# Temporary workflow to verify Tauri Windows build on the new windows-2025-vs2026
# image (Visual Studio 2026) before GitHub Actions migrates windows-latest from
# VS 2022 to VS 2026 (rollout: 2026-06-08 to 2026-06-15).
#
# Manual trigger only. Delete this file after verification.

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-windows-vs2026:
    name: Build Tauri App on windows-2025-vs2026
    runs-on: windows-2025-vs2026

    steps:
      - uses: actions/checkout@v4

      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: install dependencies (MSYS2 + GLib)
        shell: powershell
        run: |
          # Install MSYS2
          choco install msys2 -y --no-progress
          # Wait for installation to complete
          Start-Sleep -Seconds 10
          # Find MSYS2 installation path
          $msys2Path = if (Test-Path "C:\tools\msys2") { "C:\tools\msys2" } else { "C:\msys64" }
          Write-Host "MSYS2 path: $msys2Path"
          # Check if bash exists
          if (Test-Path "$msys2Path\usr\bin\bash.exe") {
            Write-Host "bash.exe found at $msys2Path\usr\bin\bash.exe"
            # Update MSYS2 package database
            & "$msys2Path\usr\bin\bash.exe" -lc "pacman -Syu --noconfirm"
            # Install GLib
            & "$msys2Path\usr\bin\bash.exe" -lc "pacman -S --noconfirm mingw-w64-x86_64-glib2 mingw-w64-x86_64-pkg-config"
            # Add to PATH
            echo "$msys2Path\mingw64\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
            echo "PKG_CONFIG_PATH=$msys2Path\mingw64\lib\pkgconfig" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          } else {
            Write-Error "bash.exe not found in $msys2Path"
            exit 1
          }

      - name: install frontend dependencies
        run: npm install

      # tauri-action without releaseId/tagName runs `tauri build` only — no release upload.
      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build summary
        if: always()
        run: |
          echo "==========================================="
          echo "  VS 2026 Windows Build Test"
          echo "==========================================="
          echo "  Runner: windows-2025-vs2026"
          echo "  Commit: ${{ github.sha }}"
          echo "==========================================="
